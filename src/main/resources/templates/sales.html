<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>
    <div th:if="${param.success}" class="alert alert-success">Sale recorded successfully.</div>

</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Products</h2>
        <div>
            <a class="btn btn-primary" th:href="@{/products/new}">Add Product</a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>Product</th>
                <th>Price (MAD)</th>
                <th>Stock</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.name}">Coffee</td>
                <td th:text="${#numbers.formatDecimal(p.price ?: 0, 0, 'COMMA', 2, 'POINT')}">0.00</td>
                <td th:text="${p.stock}">0</td>
                <td class="text-end">
                    <a class="btn btn-sm btn-success me-1" th:href="@{'/sales/add/' + ${p.id}}">Sell</a>
                    <a class="btn btn-sm btn-outline-secondary" th:href="@{'/products/edit/' + ${p.id}}">Edit</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(products)}">
                <td colspan="4" class="text-center py-3">No products found</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-3">
        <a class="btn btn-secondary" th:href="@{/dashboard}">Back to Dashboard</a>
        <a class="btn btn-outline-primary" th:href="@{/sales/history}">View Sales History</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

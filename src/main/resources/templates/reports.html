<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <h2>Reports</h2>

    <div class="row g-3">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5>Export Sales</h5>
                    <p>Download a Excel of all sales.</p>
                    <a class="btn btn-primary" th:href="@{/reports/export-sales}">Export Excel</a>



                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5>Daily Summary</h5>
                    <p>View aggregated sales per day.</p>
                    <a class="btn btn-outline-primary" th:href="@{/reports/daily}">View Daily</a>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a class="btn btn-secondary" th:href="@{/dashboard}">Back to Dashboard</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Sales History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <h2>Sales History</h2>

    <!-- Success/Error messages -->
    <div th:if="${param.success}" class="alert alert-success">Sale recorded successfully.</div>
    <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle">
            <thead class="table-light">
            <tr>
                <th>Date</th>
                <th>Product</th>
                <th class="text-end">Quantity</th>
                <th class="text-end">Unit Price (MAD)</th>
                <th class="text-end">Total (MAD)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${sales}">
                <td th:text="${s.saleDate != null ? #temporals.format(s.saleDate, 'yyyy-MM-dd HH:mm') : ''}"></td>
                <td th:text="${s.product != null ? s.product.name : 'Unknown'}"></td>
                <td class="text-end" th:text="${s.quantity}"></td>
                <td class="text-end" th:text="${s.product != null ? s.product.price : 0}"></td>
                <td class="text-end" th:text="${s.totalPrice}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(sales)}">
                <td colspan="5" class="text-center py-3">No sales recorded yet</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>

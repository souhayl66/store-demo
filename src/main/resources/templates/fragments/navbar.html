<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">Store Dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/sales}">Products</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/sales/history}">Sales History</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/reports}">Reports</a></li>
                </ul>

                <div class="d-flex align-items-center">
                    <!-- Trial message -->
                    <span class="text-warning me-3">
                        Demo trial ends after 7 days —
                     <a href="https://mail.google.com/mail/?view=cm&fs=1&to=aguedaisouhayl@gmil.com"
                        target="_blank" class="text-decoration-none text-light">
   contact me
</a>

                    </span>

                    <a class="btn btn-outline-light me-2" th:href="@{/profile}">Profile</a>

                    <!-- Logout as POST form to satisfy CSRF protection -->
                    <form th:action="@{/logout}" method="post" th:object="${#httpServletRequest}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline-light">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
</div>
</body>
</html>

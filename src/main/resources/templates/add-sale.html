<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Confirm Sale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>
    <div th:if="${param.success}" class="alert alert-success">Sale recorded successfully.</div>

</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <h2 th:text="'Sell ' + ${product.name}">Sell Product</h2>

    <div class="row">
        <div class="col-md-6">
            <div class="card mb-3">
                <div class="card-body">
                    <p><strong>Unit Price:</strong> <span th:text="${#numbers.formatDecimal(product.price ?: 0, 0, 'COMMA', 2, 'POINT')}">0.00</span> MAD</p>
                    <p><strong>Available Stock:</strong> <span th:text="${product.stock}">0</span></p>
                </div>
            </div>

            <div th:if="${param.error}" class="alert alert-danger">Not enough stock available for this product.</div>

            <form th:action="@{'/sales/add/' + ${product.id}}" method="post" class="card p-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" name="quantity" min="1" class="form-control" required/>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Confirm Sale</button>
                    <a class="btn btn-outline-secondary" th:href="@{/sales}">Cancel</a>
                </div>
            </form>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header"><strong>Product Details</strong></div>
                <div class="card-body">
                    <p><strong>Name:</strong> <span th:text="${product.name}">Name</span></p>
                    <p><strong>Description:</strong> <span th:text="${product.description}">-</span></p>
                    <p><strong>Category:</strong> <span th:text="${product.category}">-</span></p>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

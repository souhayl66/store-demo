<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <h2>Products</h2>
    <a class="btn btn-primary mb-3" th:href="@{/products/add}">Add Product</a>

    <table class="table table-hover">
        <thead>
        <tr>
            <th>Name</th>
            <th>Price (MAD)</th>
            <th>Stock</th>
            <th class="text-end">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.stock}"></td>
            <td class="text-end">
                <a class="btn btn-sm btn-outline-secondary" th:href="@{'/products/edit/' + ${p.id}}">Edit</a>
                <a class="btn btn-sm btn-danger" th:href="@{'/products/delete/' + ${p.id}}">Delete</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="4" class="text-center">No products found</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
